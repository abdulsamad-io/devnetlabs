[defaults]
inventory = inventory.yml
roles_path = roles
retry_files_enabled = False
# YAML task output: the old `community.general.yaml` callback was removed in
# community.general 12. Use the built-in default callback's result_format instead.
callback_result_format = yaml
host_key_checking = False
# Baseline runs over SSH with sudo (unlike the API-driven technitium project).

[privilege_escalation]
become = True
become_method = sudo
