---
- name: Install unattended-upgrades
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Enable periodic update + unattended-upgrade
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

- name: Configure automatic reboot for kernel updates (optional)
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/52unattended-upgrades-local
    owner: root
    group: root
    mode: "0644"
    content: |
      // Managed by the baseline role.
      Unattended-Upgrade::Automatic-Reboot "{{ baseline_auto_reboot | ternary('true','false') }}";
      Unattended-Upgrade::Automatic-Reboot-Time "{{ baseline_auto_reboot_time }}";

- name: Ensure the unattended-upgrades timer/service is enabled
  ansible.builtin.service:
    name: unattended-upgrades
    state: started
    enabled: true
