---
- name: Install rsyslog
  ansible.builtin.apt:
    name: rsyslog
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Forward all logs to the central collector(s)
  ansible.builtin.template:
    src: rsyslog-forward.conf.j2
    dest: /etc/rsyslog.d/90-devnetlabs-forward.conf
    owner: root
    group: root
    mode: "0644"
    validate: 'rsyslogd -N1 -f %s'
  notify: restart rsyslog

- name: Ensure rsyslog is enabled + running
  ansible.builtin.service:
    name: rsyslog
    state: started
    enabled: true
