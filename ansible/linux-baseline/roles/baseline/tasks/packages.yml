---
- name: Refresh apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Full upgrade (opt-in — disruptive)
  ansible.builtin.apt:
    upgrade: dist
  when: baseline_apt_upgrade | bool

- name: Autoremove unused packages
  ansible.builtin.apt:
    autoremove: true
    purge: true
  when: baseline_apt_autoremove | bool
