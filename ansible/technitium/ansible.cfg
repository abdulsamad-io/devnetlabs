[defaults]
inventory = inventory.yml
retry_files_enabled = False
# YAML task output: the old `community.general.yaml` callback was removed in
# community.general 12. Use the built-in default callback's result_format instead.
callback_result_format = yaml
# Tasks talk to the Technitium HTTP API from the control node (connection: local),
# so no SSH into the DNS servers is needed.
host_key_checking = False
