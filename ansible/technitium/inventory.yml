---
# Two Technitium instances: dnldns101 (primary) + dnldns201 (secondary).
# Tasks run from the control node against each host's HTTP API (connection: local),
# so these are API targets, not SSH targets.
all:
  children:
    technitium:
      hosts:
        dnldns101:      # primary  (dc01)
          ansible_host: 172.16.10.53
        dnldns201:      # secondary (dc02)
          ansible_host: 172.16.10.54
